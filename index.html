<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>WebSocket Client</title>
        <style>
            h1 {
                color: green;
                text-align: center;
            }

            .container {
                margin: 10px;
            }
        </style>
    </head>
    <body>
        <h1>WebSocket Example</h1>
        <div id="ip_input" class="container">
            <label>IP of server:</label>
            <label for="serverip"></label><input id="serverip" type="text">
            <button onclick="setIP()">Connect</button>
        </div>
        <div class="container">
            <label>Send Message to the Server:</label> <br><br>
            <label for="messageInput"></label><input type="text" id="messageInput">
            <button onclick="sendMessage()">Send</button>
            <div id="output"></div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
